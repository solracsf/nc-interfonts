# SPDX-License-Identifier: AGPL-3.0-or-later
#
# REUSE 3.2 configuration — covers files that cannot carry inline
# SPDX headers (binary fonts, JSON, the verbatim AGPL license text).
# Every file shipped in the release tarball must be accounted for either
# by an inline header or an entry below; running `reuse lint` in CI keeps
# this honest.

version = 1
SPDX-PackageName            = "interfonts"
SPDX-PackageSupplier         = "Inter Fonts App Contributors <https://github.com/solracsf/nc-interfonts>"
SPDX-PackageDownloadLocation = "https://github.com/solracsf/nc-interfonts"

# ---------------------------------------------------------------------------
# Bundled Inter variable fonts (rsms/inter, OFL-1.1)
# ---------------------------------------------------------------------------
[[annotations]]
path = [
    "fonts/InterVariable-*.woff2",
    "fonts/InterVariable-Italic-*.woff2",
    "fonts/inter-version.txt",
]
precedence              = "aggregate"
SPDX-FileCopyrightText  = "2016-2024 The Inter Project Authors <https://github.com/rsms/inter>"
SPDX-License-Identifier = "OFL-1.1"

# ---------------------------------------------------------------------------
# JSON dev-tool configs — JSON has no comment syntax, so REUSE.toml is the
# only place to declare provenance.
# ---------------------------------------------------------------------------
[[annotations]]
path = [
    "composer.json",
    ".markdownlint.json",
]
precedence              = "aggregate"
SPDX-FileCopyrightText  = "2026 Inter Fonts App Contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# ---------------------------------------------------------------------------
# COPYING — verbatim text of the GNU AGPL 3.0 license, published by the FSF.
# ---------------------------------------------------------------------------
[[annotations]]
path                    = "COPYING"
precedence              = "aggregate"
SPDX-FileCopyrightText  = "2007 Free Software Foundation, Inc. <https://fsf.org/>"
SPDX-License-Identifier = "AGPL-3.0-or-later"
