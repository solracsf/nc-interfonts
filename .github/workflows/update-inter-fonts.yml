# .github/workflows/update-inter-fonts.yml
#
# Monitors rsms/inter for new releases via a weekly schedule poll.
# When a newer Inter version is detected it:
#   1. Downloads the official Inter release ZIP
#   2. Extracts the variable WOFF2 files (roman + italic)
#   3. Removes the previously bundled versioned WOFF2 files
#   4. Writes them as fonts/InterVariable-<ver>.woff2 and
#      fonts/InterVariable-Italic-<ver>.woff2
#   5. Updates fonts/inter-version.txt
#   6. Bumps the app minor version in appinfo/info.xml and CHANGELOG.md
#   7. Commits everything directly to main
#   8. Creates and pushes a Git tag for the new app version
#   9. Publishes a GitHub Release with release notes
#
# Inter v4.x ZIP layout (confirmed):
#   web/InterVariable.woff2          <- roman variable font
#   web/InterVariable-Italic.woff2   <- italic variable font
#
# Triggers
# --------
# - schedule        : weekly poll every Sunday 02:00 UTC
# - workflow_dispatch: manual run with optional version override

name: Update Inter Fonts

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force a specific Inter tag, e.g. "v4.2". Leave empty for latest.'
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-fonts:
    name: Check & update Inter variable fonts
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout with full history so we can commit & tag
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 2. Resolve target Inter version
      # -----------------------------------------------------------------------
      - name: Resolve target Inter version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "${{ inputs.force_version }}" ]]; then
            TARGET="${{ inputs.force_version }}"
          else
            TARGET=$(gh release view --repo rsms/inter --json tagName -q '.tagName')
          fi

          if ! echo "$TARGET" | grep -qE '^v[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "ERROR: unexpected version format: $TARGET" >&2
            exit 1
          fi

          # Strip leading 'v' for use in filenames (matches Application::interVersion())
          VERSION_NUM="${TARGET#v}"

          echo "Resolved Inter version: $TARGET (filename suffix: $VERSION_NUM)"
          echo "target_version=$TARGET"          >> "$GITHUB_OUTPUT"
          echo "target_version_num=$VERSION_NUM" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 3. Read current committed Inter version
      # -----------------------------------------------------------------------
      - name: Read current Inter version
        id: current
        run: |
          if [[ -f fonts/inter-version.txt ]]; then
            CURRENT=$(cat fonts/inter-version.txt | tr -d '[:space:]')
          else
            CURRENT="none"
          fi
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Currently committed: $CURRENT"

      # -----------------------------------------------------------------------
      # 4. Skip if already up-to-date
      # -----------------------------------------------------------------------
      - name: Check if update is needed
        id: check
        run: |
          TARGET="${{ steps.resolve.outputs.target_version }}"
          CURRENT="${{ steps.current.outputs.current_version }}"
          if [[ "$TARGET" == "$CURRENT" ]]; then
            echo "Already at $TARGET - nothing to do."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update needed: $CURRENT -> $TARGET"
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # 5. Compute new app version (bump minor, reset patch)
      # -----------------------------------------------------------------------
      - name: Compute new app version
        id: appver
        if: steps.check.outputs.needs_update == 'true'
        run: |
          CURRENT_APP=$(grep -oP '(?<=<version>)[^<]+' appinfo/info.xml | tr -d '[:space:]')
          MAJOR=$(echo "$CURRENT_APP" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_APP" | cut -d. -f2)

          NEW_MINOR=$(( MINOR + 1 ))
          NEW_APP_VERSION="${MAJOR}.${NEW_MINOR}.0"

          echo "App version: $CURRENT_APP -> $NEW_APP_VERSION"
          echo "current_app_version=$CURRENT_APP" >> "$GITHUB_OUTPUT"
          echo "new_app_version=$NEW_APP_VERSION"  >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 6. Download Inter release ZIP
      # -----------------------------------------------------------------------
      - name: Download Inter release ZIP
        if: steps.check.outputs.needs_update == 'true'
        env:
          TARGET:      ${{ steps.resolve.outputs.target_version }}
          VERSION_NUM: ${{ steps.resolve.outputs.target_version_num }}
        run: |
          ZIP_URL="https://github.com/rsms/inter/releases/download/${TARGET}/Inter-${VERSION_NUM}.zip"
          echo "Downloading: $ZIP_URL"
          curl -fsSL "$ZIP_URL" -o /tmp/inter.zip
          echo "Downloaded: $(du -h /tmp/inter.zip | cut -f1)"

          echo "WOFF2 files in ZIP:"
          unzip -l /tmp/inter.zip | grep -i '\.woff2' | awk '{print $NF}' | sort

      # -----------------------------------------------------------------------
      # 7. Extract variable WOFF2 files
      #
      # Inter v4.x layout (confirmed):
      #   web/InterVariable.woff2
      #   web/InterVariable-Italic.woff2
      #
      # The script tries three strategies in order, covering past layouts
      # (extras/variable/) and any future renames, so the workflow stays
      # resilient across Inter releases without manual intervention.
      # -----------------------------------------------------------------------
      - name: Extract variable WOFF2 files
        if: steps.check.outputs.needs_update == 'true'
        env:
          VERSION_NUM: ${{ steps.resolve.outputs.target_version_num }}
        run: |
          mkdir -p /tmp/inter_extracted fonts

          echo "--- Strategy 1: web/InterVariable*.woff2 (v4.x layout) ---"
          unzip -o /tmp/inter.zip \
            'web/InterVariable.woff2' \
            'web/InterVariable-Italic.woff2' \
            -d /tmp/inter_extracted || true

          ROMAN=$(find /tmp/inter_extracted -name 'InterVariable.woff2' | head -1)
          ITALIC=$(find /tmp/inter_extracted -name 'InterVariable-Italic.woff2' | head -1)

          if [[ -z "$ROMAN" || -z "$ITALIC" ]]; then
            echo "--- Strategy 2: extras/variable/Inter[wght].woff2 (pre-v4.x layout) ---"
            unzip -o /tmp/inter.zip \
              '*/extras/variable/*.woff2' \
              -d /tmp/inter_extracted || true

            ROMAN=$(find /tmp/inter_extracted/extras/variable -name '*Variable.woff2' ! -name '*Italic*' | head -1)
            ITALIC=$(find /tmp/inter_extracted/extras/variable -name '*Variable*Italic*.woff2' | head -1)
          fi

          if [[ -z "$ROMAN" || -z "$ITALIC" ]]; then
            echo "--- Strategy 3: full extract + broadest name match ---"
            unzip -o /tmp/inter.zip -d /tmp/inter_extracted 2>/dev/null || true

            # Match any variable WOFF2 that is NOT a static weight file
            ROMAN=$(find /tmp/inter_extracted -name '*.woff2' | grep -i 'variable' | grep -iv 'italic' | grep -iv 'display' | head -1)
            ITALIC=$(find /tmp/inter_extracted -name '*.woff2' | grep -i 'variable' | grep -i 'italic' | grep -iv 'display' | head -1)
          fi

          if [[ -z "$ROMAN" ]]; then
            echo "ERROR: could not locate a roman variable WOFF2 in the ZIP" >&2
            echo "All WOFF2 files present:"
            find /tmp/inter_extracted -name '*.woff2' | sort
            exit 1
          fi
          if [[ -z "$ITALIC" ]]; then
            echo "ERROR: could not locate an italic variable WOFF2 in the ZIP" >&2
            echo "All WOFF2 files present:"
            find /tmp/inter_extracted -name '*.woff2' | sort
            exit 1
          fi

          echo "Roman  : $ROMAN ($(du -h "$ROMAN" | cut -f1))"
          echo "Italic : $ITALIC ($(du -h "$ITALIC" | cut -f1))"

          # Remove any previously bundled versioned WOFF2 files so we don't
          # ship two copies side by side. Match the pattern the PHP code uses.
          rm -f fonts/InterVariable-*.woff2 fonts/InterVariable-Italic-*.woff2

          # Write new files with version embedded in the filename. The PHP
          # FontController allowlist is generated from inter-version.txt,
          # so the names must follow this exact pattern:
          #   InterVariable-<version>.woff2
          #   InterVariable-Italic-<version>.woff2
          cp "$ROMAN"  "fonts/InterVariable-${VERSION_NUM}.woff2"
          cp "$ITALIC" "fonts/InterVariable-Italic-${VERSION_NUM}.woff2"
          echo "${{ steps.resolve.outputs.target_version }}" > fonts/inter-version.txt

          echo "Bundled files:"
          ls -lh fonts/

      # -----------------------------------------------------------------------
      # 8. Bump app version in appinfo/info.xml
      # -----------------------------------------------------------------------
      - name: Bump app version in info.xml
        if: steps.check.outputs.needs_update == 'true'
        env:
          OLD: ${{ steps.appver.outputs.current_app_version }}
          NEW: ${{ steps.appver.outputs.new_app_version }}
        run: |
          sed -i "s|<version>${OLD}</version>|<version>${NEW}</version>|" appinfo/info.xml
          echo "info.xml version: $OLD -> $NEW"

      # -----------------------------------------------------------------------
      # 9. Update CHANGELOG.md (Keep a Changelog format)
      #
      # Promotes ## [Unreleased] content to the new versioned entry (falls
      # back to a generic Changed entry if [Unreleased] is empty).
      # Resets [Unreleased] to empty for the next cycle.
      # -----------------------------------------------------------------------
      - name: Update CHANGELOG.md
        if: steps.check.outputs.needs_update == 'true'
        env:
          NEW_APP: ${{ steps.appver.outputs.new_app_version }}
          INTER:   ${{ steps.resolve.outputs.target_version }}
          OLD_APP: ${{ steps.appver.outputs.current_app_version }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          UNRELEASED=$(awk '
            /^## \[Unreleased\]/ { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d')

          if [[ -z "$UNRELEASED" ]]; then
            BODY="### Changed"$'\n'"- Updated bundled Inter font to ${INTER}."$'\n'"  Source: https://github.com/rsms/inter/releases/tag/v${INTER}"
          else
            BODY="$UNRELEASED"
          fi

          printf '\n## %s - %s\n\n%s\n\n' "${NEW_APP}" "${DATE}" "${BODY}" \
            > /tmp/changelog-entry.md

          awk '
            /^## \[Unreleased\]/ { found=1 }
            found && /^## / && !/\[Unreleased\]/ { exit }
            !found { print }
          ' CHANGELOG.md > /tmp/changelog-new.md

          printf '\n## [Unreleased]\n' >> /tmp/changelog-new.md
          cat /tmp/changelog-entry.md >> /tmp/changelog-new.md

          awk '
            /^## \[Unreleased\]/ { inUnreleased=1; next }
            inUnreleased && /^## / && !/\[Unreleased\]/ { inUnreleased=0; past=1 }
            past { print }
          ' CHANGELOG.md >> /tmp/changelog-new.md

          mv /tmp/changelog-new.md CHANGELOG.md
          echo "CHANGELOG.md updated: added entry for ${NEW_APP}"

      # -----------------------------------------------------------------------
      # 10. Commit all changes directly to main
      # -----------------------------------------------------------------------
      - name: Commit updated files
        if: steps.check.outputs.needs_update == 'true'
        env:
          NEW_APP: ${{ steps.appver.outputs.new_app_version }}
          INTER:   ${{ steps.resolve.outputs.target_version }}
        run: |
          git config user.name  "solracsf"
          git config user.email "12234510+solracsf@users.noreply.github.com"

          git add fonts/ appinfo/info.xml CHANGELOG.md

          git commit --signoff -m "chore(release): bump app to ${NEW_APP}, update Inter font to ${INTER}"
          git push origin main

      # -----------------------------------------------------------------------
      # 11. Create and push a Git tag for the new app version
      # -----------------------------------------------------------------------
      - name: Tag new app version
        if: steps.check.outputs.needs_update == 'true'
        env:
          NEW_APP: ${{ steps.appver.outputs.new_app_version }}
          INTER:   ${{ steps.resolve.outputs.target_version }}
        run: |
          TAG="v${NEW_APP}"
          git tag -a "$TAG" -m "Release ${TAG} - bundles Inter font ${INTER}"
          git push origin "$TAG"
          echo "Pushed tag: $TAG"

      # -----------------------------------------------------------------------
      # 12. Write release notes to file, then publish GitHub Release
      # -----------------------------------------------------------------------
      - name: Write release notes
        if: steps.check.outputs.needs_update == 'true'
        env:
          NEW_APP:       ${{ steps.appver.outputs.new_app_version }}
          OLD_APP:       ${{ steps.appver.outputs.current_app_version }}
          INTER:         ${{ steps.resolve.outputs.target_version }}
          CURRENT_INTER: ${{ steps.current.outputs.current_version }}
          REPO_URL:      ${{ github.server_url }}/${{ github.repository }}
        run: |
          cat > /tmp/release-notes.md << 'NOTES_EOF'
          ## What changed

          Updated bundled Inter variable font to **${INTER}** (was `${CURRENT_INTER}`).

          | | |
          |---|---|
          | **App version** | `${NEW_APP}` (was `${OLD_APP}`) |
          | **Bundled Inter** | [${INTER}](https://github.com/rsms/inter/releases/tag/${INTER}) |

          ### Files updated
          - `fonts/InterVariable-*.woff2`
          - `fonts/InterVariable-Italic-*.woff2`
          - `fonts/inter-version.txt`
          - `appinfo/info.xml`
          - `CHANGELOG.md`

          ---
          _Released automatically by the [Update Inter Fonts](${REPO_URL}/actions/workflows/update-inter-fonts.yml) workflow._
          NOTES_EOF

          envsubst < /tmp/release-notes.md > /tmp/release-notes-expanded.md

      - name: Publish GitHub Release
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_APP:  ${{ steps.appver.outputs.new_app_version }}
        run: |
          gh release create "v${NEW_APP}" \
            --title "Inter Fonts ${NEW_APP}" \
            --notes-file /tmp/release-notes-expanded.md
