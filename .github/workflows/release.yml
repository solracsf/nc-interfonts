# .github/workflows/release.yml
#
# Publishes a release of the Inter Fonts Nextcloud app directly from the
# GitHub Actions WebUI (Actions → Publish Release → Run workflow).
#
# Inputs
# ------
# bump_type   major | minor | patch   Which SemVer component to increment.
# prerelease  true  | false           Mark the GitHub Release as pre-release.
#
# What the workflow does
# ----------------------
# 1.  Reads the current version from appinfo/info.xml.
# 2.  Increments the requested component (major resets minor+patch,
#     minor resets patch, patch just increments patch).
# 3.  Updates appinfo/info.xml and CHANGELOG.md with the new version.
#     Content staged under ## [Unreleased] is promoted to the new version
#     entry; [Unreleased] is reset to empty for the next cycle.
# 4.  Commits and pushes directly to main.
# 5.  Creates and pushes an annotated Git tag (vX.Y.Z).
# 6.  Builds the App Store tarball: a clean interfonts/ folder containing
#     only runtime files (appinfo/, fonts/, img/, lib/, COPYING, README.md,
#     CHANGELOG.md). Dev files (.git, .github, etc.) are excluded.
# 7.  Publishes a GitHub Release and attaches the tarball as a release asset.
# 8.  Signs the tarball with APP_PRIVATE_KEY and POSTs the download URL +
#     signature to the Nextcloud App Store API. Skipped gracefully when
#     APPSTORE_TOKEN is not configured.
#
# One-time prerequisites (manual, done once per app)
# ---------------------------------------------------
# a) Generate a 4096-bit RSA key and CSR:
#      openssl req -nodes -newkey rsa:4096 \
#        -keyout interfonts.key -out interfonts.csr -subj "/CN=interfonts"
# b) Submit interfonts.csr as a PR to:
#      https://github.com/nextcloud/app-certificate-requests
# c) After the PR is merged, download interfonts.crt from that repo.
# d) Register the app on the App Store:
#      - Go to https://apps.nextcloud.com/developer/apps/new
#      - Paste the contents of interfonts.crt into the Certificate field
#      - Compute the ownership signature and paste it into the Signature field:
#          echo -n "interfonts" | openssl dgst -sha512 -sign interfonts.key | openssl base64
# e) Add three GitHub Secrets to this repository:
#      APP_PRIVATE_KEY  — PEM contents of interfonts.key   (never commit this)
#      APP_PUBLIC_CRT   — PEM contents of interfonts.crt
#      APPSTORE_TOKEN   — token from apps.nextcloud.com/account/token
#
# Permissions
# -----------
# The built-in GITHUB_TOKEN is used for all Git and GitHub API operations;
# no personal access token is needed.

name: Publish Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Mark as pre-release?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  release:
    name: Bump version & publish release
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout with full history so we can commit & tag
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 2. Read current version from appinfo/info.xml
      # -----------------------------------------------------------------------
      - name: Read current version
        id: current
        run: |
          CURRENT=$(grep -oP '(?<=<version>)[^<]+' appinfo/info.xml | tr -d '[:space:]')

          if ! echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: unexpected version format in info.xml: '$CURRENT'" >&2
            exit 1
          fi

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          echo "Current version : $CURRENT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR"     >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR"     >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH"     >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 3. Compute new version according to the requested bump type
      # -----------------------------------------------------------------------
      - name: Compute new version
        id: new
        env:
          BUMP:  ${{ inputs.bump_type }}
          MAJOR: ${{ steps.current.outputs.major }}
          MINOR: ${{ steps.current.outputs.minor }}
          PATCH: ${{ steps.current.outputs.patch }}
        run: |
          case "$BUMP" in
            major)
              NEW_MAJOR=$(( MAJOR + 1 ))
              NEW_VERSION="${NEW_MAJOR}.0.0"
              ;;
            minor)
              NEW_MINOR=$(( MINOR + 1 ))
              NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"
              ;;
            patch)
              NEW_PATCH=$(( PATCH + 1 ))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
              ;;
            *)
              echo "ERROR: unknown bump_type '$BUMP'" >&2
              exit 1
              ;;
          esac

          TAG="v${NEW_VERSION}"
          echo "New version : $NEW_VERSION  (bump: $BUMP)"
          echo "Tag         : $TAG"

          # Abort if this tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "ERROR: tag $TAG already exists. Did you mean a different bump type?" >&2
            exit 1
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 4. Update appinfo/info.xml
      # -----------------------------------------------------------------------
      - name: Update appinfo/info.xml
        env:
          OLD: ${{ steps.current.outputs.current }}
          NEW: ${{ steps.new.outputs.version }}
        run: |
          sed -i "s|<version>${OLD}</version>|<version>${NEW}</version>|" appinfo/info.xml
          echo "info.xml: $OLD -> $NEW"

          # Verify the substitution actually happened
          WRITTEN=$(grep -oP '(?<=<version>)[^<]+' appinfo/info.xml | tr -d '[:space:]')
          if [[ "$WRITTEN" != "$NEW" ]]; then
            echo "ERROR: version in info.xml is '$WRITTEN', expected '$NEW'" >&2
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 5. Update CHANGELOG.md (Keep a Changelog format)
      #
      # Strategy:
      #  - Move the content of the ## [Unreleased] block into a new versioned
      #    entry. If [Unreleased] is empty, a generic "Version bump" entry is
      #    used instead.
      #  - Replace ## [Unreleased] with an empty reset block for the next cycle.
      #
      # Edit CHANGELOG.md *before* running the release workflow if you want
      # meaningful release notes: put your changes under ## [Unreleased] and
      # this step will promote them to the new version entry automatically.
      # -----------------------------------------------------------------------
      - name: Update CHANGELOG.md
        env:
          OLD: ${{ steps.current.outputs.current }}
          NEW: ${{ steps.new.outputs.version }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          # Extract the content between ## [Unreleased] and the next ## heading.
          # sed: skip lines until [Unreleased], then print until the next ##.
          UNRELEASED=$(awk '
            /^## \[Unreleased\]/ { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d')

          if [[ -z "$UNRELEASED" ]]; then
            # Nothing staged under [Unreleased] — use a generic entry
            BODY="### Changed"$'\n'"- Version bump from ${OLD} to ${NEW}."
          else
            BODY="$UNRELEASED"
          fi

          # Build the versioned entry
          cat > /tmp/changelog-entry.md <<ENTRY

## ${NEW} - ${DATE}

${BODY}

ENTRY

          # Rebuild CHANGELOG.md:
          #  header lines (up to and including ## [Unreleased]) → reset block → new entry → old entries
          awk '
            /^## \[Unreleased\]/ { found=1 }
            found && /^## / && !/\[Unreleased\]/ { exit }
            !found { print }
          ' CHANGELOG.md > /tmp/changelog-new.md

          # Append reset [Unreleased] block
          printf '\n## [Unreleased]\n' >> /tmp/changelog-new.md

          # Append the new versioned entry
          cat /tmp/changelog-entry.md >> /tmp/changelog-new.md

          # Append all old versioned entries (everything after [Unreleased] block)
          awk '
            /^## \[Unreleased\]/ { skip=1; next }
            skip && /^## / && !/\[Unreleased\]/ { skip=0 }
            !skip { print }
          ' CHANGELOG.md >> /tmp/changelog-new.md

          mv /tmp/changelog-new.md CHANGELOG.md
          echo "CHANGELOG.md updated: added entry for ${NEW}"

      # -----------------------------------------------------------------------
      # 6. Commit updated files directly to main
      # -----------------------------------------------------------------------
      - name: Commit version bump
        env:
          OLD: ${{ steps.current.outputs.current }}
          NEW: ${{ steps.new.outputs.version }}
          TAG: ${{ steps.new.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add appinfo/info.xml CHANGELOG.md
          git commit -m "chore(release): bump version ${OLD} → ${NEW}"
          git push origin main
          echo "Pushed version bump commit to main"

      # -----------------------------------------------------------------------
      # 7. Create and push an annotated Git tag
      # -----------------------------------------------------------------------
      - name: Create and push Git tag
        env:
          TAG:  ${{ steps.new.outputs.tag }}
          NEW:  ${{ steps.new.outputs.version }}
          BUMP: ${{ inputs.bump_type }}
        run: |
          git tag -a "$TAG" \
            -m "Release ${TAG}" \
            -m "Bump type : ${BUMP}" \
            -m "Released  : $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin "$TAG"
          echo "Pushed tag: $TAG"

      # -----------------------------------------------------------------------
      # 8. Build release notes
      # -----------------------------------------------------------------------
      - name: Build release notes
        id: notes
        env:
          OLD:       ${{ steps.current.outputs.current }}
          NEW:       ${{ steps.new.outputs.version }}
          TAG:       ${{ steps.new.outputs.tag }}
          BUMP:      ${{ inputs.bump_type }}
          REPO_URL:  ${{ github.server_url }}/${{ github.repository }}
          ACTOR:     ${{ github.actor }}
        run: |
          # Read bundled Inter version for the table
          if [[ -f fonts/inter-version.txt ]]; then
            INTER=$(cat fonts/inter-version.txt | tr -d '[:space:]')
          else
            INTER="unknown"
          fi

          cat > /tmp/release-notes.md << EOF
          ## Inter Fonts ${NEW}

          | | |
          |---|---|
          | **Version** | \`${NEW}\` (was \`${OLD}\`) |
          | **Bump type** | ${BUMP} |
          | **Bundled Inter** | ${INTER} |
          | **Released by** | [@${ACTOR}](${REPO_URL%/*}/${ACTOR}) |

          ## Installation

          \`\`\`bash
          TAG=${TAG}
          curl -fsSL "https://github.com/solracsf/nc-interfonts/releases/download/\${TAG}/interfonts.tar.gz" \
            -o /tmp/interfonts.tar.gz
          tar -xzf /tmp/interfonts.tar.gz -C /var/www/nextcloud/apps/
          chown -R www-data:www-data /var/www/nextcloud/apps/interfonts/
          sudo -u www-data php /var/www/nextcloud/occ app:enable interfonts
          \`\`\`

          See the full [CHANGELOG](${REPO_URL}/blob/${TAG}/CHANGELOG.md) for details.

          ---
          _Published by the [Publish Release](${REPO_URL}/actions/workflows/release.yml) workflow._
          EOF

      # -----------------------------------------------------------------------
      # 9. Build the App Store tarball
      #
      # The Nextcloud App Store requires a .tar.gz whose top-level folder
      # name matches <id> in info.xml exactly ("interfonts").
      # The auto-generated GitHub source archive has folder name
      # "nc-interfonts-X.Y.Z/" and includes dev files — unsuitable.
      # -----------------------------------------------------------------------
      - name: Build app store tarball
        run: |
          APP_DIR=/tmp/build/interfonts

          mkdir -p "${APP_DIR}"

          # Copy only files needed at runtime
          cp -r appinfo fonts img lib "${APP_DIR}/"
          cp COPYING README.md CHANGELOG.md "${APP_DIR}/"

          tar -czf /tmp/interfonts.tar.gz -C /tmp/build interfonts

          echo "Tarball contents (top level):"
          tar -tzf /tmp/interfonts.tar.gz | grep -E '^interfonts/[^/]+/?$' | sort

          echo "Tarball size: $(du -sh /tmp/interfonts.tar.gz | cut -f1)"

      # -----------------------------------------------------------------------
      # 10. Publish GitHub Release and attach the tarball
      # -----------------------------------------------------------------------
      - name: Publish GitHub Release
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          TAG:         ${{ steps.new.outputs.tag }}
          NEW:         ${{ steps.new.outputs.version }}
          PRERELEASE:  ${{ inputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "Inter Fonts ${NEW}" \
            --notes-file /tmp/release-notes.md \
            --latest \
            /tmp/interfonts.tar.gz \
            $PRERELEASE_FLAG

          echo "Published: $TAG"
          echo "URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"

      # -----------------------------------------------------------------------
      # 11. Sign tarball and publish to the Nextcloud App Store
      #
      # Skipped if APPSTORE_TOKEN is not configured (before the app is
      # registered on the store for the first time).
      # -----------------------------------------------------------------------
      - name: Publish to Nextcloud App Store
        env:
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          TAG:             ${{ steps.new.outputs.tag }}
          APPSTORE_TOKEN:  ${{ secrets.APPSTORE_TOKEN }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          PRERELEASE:      ${{ inputs.prerelease }}
        run: |
          if [[ -z "${APPSTORE_TOKEN}" ]]; then
            echo "APPSTORE_TOKEN not configured — skipping App Store publish."
            echo "See workflow comments for one-time setup instructions."
            exit 0
          fi

          if [[ -z "${APP_PRIVATE_KEY}" ]]; then
            echo "ERROR: APP_PRIVATE_KEY secret is not set." >&2
            exit 1
          fi

          # Write the private key to a temp file (auto-cleaned by runner)
          echo "${APP_PRIVATE_KEY}" > /tmp/interfonts.key
          chmod 600 /tmp/interfonts.key

          # Direct download URL of the tarball attached to the release
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/interfonts.tar.gz"

          # Sign the tarball with SHA-512 (this is what the App Store API verifies)
          SIGNATURE=$(openssl dgst -sha512 \
            -sign /tmp/interfonts.key \
            /tmp/interfonts.tar.gz \
            | openssl base64 -A)

          NIGHTLY="false"
          if [[ "${PRERELEASE}" == "true" ]]; then
            NIGHTLY="true"
          fi

          HTTP_STATUS=$(curl -s -o /tmp/appstore-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Token ${APPSTORE_TOKEN}" \
            -H "Content-Type: application/json; charset=utf8" \
            "https://apps.nextcloud.com/api/v1/apps/releases" \
            -d "{\"download\": \"${DOWNLOAD_URL}\", \"signature\": \"${SIGNATURE}\", \"nightly\": ${NIGHTLY}}")

          echo "App Store HTTP status: ${HTTP_STATUS}"
          cat /tmp/appstore-response.json

          # 200 = updated, 201 = created
          if [[ "${HTTP_STATUS}" != "200" && "${HTTP_STATUS}" != "201" ]]; then
            echo "ERROR: App Store API returned HTTP ${HTTP_STATUS}" >&2
            exit 1
          fi

          echo "Successfully published to the Nextcloud App Store."
