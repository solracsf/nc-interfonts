#
# Dependabot keeps two surfaces up to date:
#   1. composer dev-dependencies (PHPUnit at the moment)
#   2. GitHub Actions versions referenced by workflows in .github/workflows
#
# Production runtime has zero composer dependencies — the app ships only
# its lib/ PHP files, which run against whatever OCP version Nextcloud
# itself loads. So composer updates here only ever touch dev tooling.

version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    labels:
      - dependencies
      - php

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      # Group all action bumps into a single PR per week to keep noise low.
      actions:
        patterns:
          - "*"
